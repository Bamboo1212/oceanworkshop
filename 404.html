  <meta http-equiv="content-type" content="text/html; charset=utf-8">
  <meta http-equiv="x-ua-compatible" content="IE=edge">

  <meta name="author" content="https://www.ocean-workshop.tw/">

  <!-- og -->
  <meta property="og:title" content="海洋工作坊">
  <meta property="og:description" content="海洋工作坊致力於推廣海洋教育與永續行動，透過多元課程與體驗活動，帶領大小朋友親近海洋、認識生態，一起守護湛藍的海洋家園。">

  <meta property="og:site_name" content="海洋工作坊">
  <meta property="og:url" content="https://www.ocean-workshop.tw/">
  <meta property="og:image" content="images/og_1200x630.png">
  <meta property="og:image:type" content="image/png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">

  <!-- 手機友好化 -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="=apple-mobile-web-app-capable" content="yes">
  <meta name="format-detection" content="telephone=no">

  <!-- css -->
  <link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/font-icons.css">
	<link rel="stylesheet" href="css/custom.css">
  <!-- 樣式Css -->
  <style>

  :root {
    --primary: var(--cnvs-themecolor);
    --white: #FFF;
    --btn-bg: #444;
    --bg: #f9f9f9;
    --error-tx: #eee;
  }

  * {
    font-family: 'Noto Sans TC', sans-serif;
  }

  html {
    height: 100%;
  }

  ::selection {
    background-color: var(--primary);
    color: var(--white);
  }

  .error-page {
    margin: 0;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 100%;
    height: 100%;
  }

  .error-box {
    position: relative;
    width: 100%;
    display: inline-flex;
    justify-content: center;
    flex-wrap: wrap;
  }

  .error-box-text {
    z-index: 999;
    width: 400px;
    position: relative;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
  }

  .error-box-text .title {
    text-align: center;
    font-size: 200px;
    font-weight: 700;
    color: var(--primary);
    line-height: 1;
    margin-top: 0;
  }

  .error-box-text .btn {
    margin-top: 20px;
    padding: 10px 16px;
    background-color: var(--btn-bg);
    transition: 0.5s;
  }

  .error-box-text .btn a {
    color: var(--white);
    text-decoration: none;
    font-weight: 400;
    letter-spacing: 1px;
    font-size: 16px;
  }

  .error-box-text .btn:hover {
    background-color: var(--primary);
  }

  .back-box {
    background: var(--bg);
    position: relative;
    padding: 30px 0;
    width: 100%;
    margin-top: 30px;
  }

  .error-box p {
    color: var(--error-tx);
    font-size: 250px;
    line-height: 1.2;
    font-weight: 600;
    text-align: center;
    letter-spacing: 10px;
    text-transform: uppercase;
    margin-top: 0;
    margin-bottom: 0;
  }

  @media (max-width: 991px) {
    .error-box p {
      font-size: 170px;
    }

    .error-box-text .btn {
      margin-top: 15px;
    }

    .back-box {
      margin-top: 20px;

    }
  }

  @media (max-width: 767px) {
    .back-box {
      display: none;
    }
  }

  @media (max-width: 575px) {
    .error-box-text .title {
      font-size: 130px;
    }

    .error-box-text {
      width: 300px;
    }

    .error-box-text .btn {
      padding: 7px 12px;
    }

    .error-box-text .btn a {
      font-size: 15px;
    }
  }
  </style>
</head>

<body class="error-page">
  <!-- 404 START -->
  <div class="error-box">
    <div class="error-box-text">
      <div class="title">404</div>
      <a href="index.html" class="btn-base mt-4">
        <span class="txt">返回首頁</span>
        <span class="shape"></span>
        <span class="shape"></span>
        <span class="shape"></span>
        <span class="shape"></span>
      </a>
    </div>
    <div class="back-box">
      <p>Error</p>
    </div>
  </div>
  <!-- 404 END -->
  <div id="__REC__-container"></div>
</body>

</html>
